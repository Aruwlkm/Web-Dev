<h2>Album Detail</h2>

<p>ID: {{ album.id }}</p>
<p>User ID: {{ album.userId }}</p>
<p>Title: {{ album.title }}</p>

<input [(ngModel)]="newTitle">
<button (click)="save()">Save</button>

<br><br>

<a [routerLink]="['/albums', album.id, 'photos']">View Photos</a>
<br><br>

<button routerLink="/albums">Back</button>
